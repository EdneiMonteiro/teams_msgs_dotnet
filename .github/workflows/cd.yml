name: CD

# CD manual: rode sob demanda (Actions -> CD -> Run workflow). Não dispara em push
# para evitar runs vermelhos enquanto o OIDC (AZURE_CLIENT_ID) não estiver configurado.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag override (defaults to short SHA)'
        required: false

permissions:
  contents: read
  id-token: write     # OIDC to Azure

env:
  AZ_SUBSCRIPTION: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  AZ_RG: ${{ vars.AZ_RG }}              # configurar via AZ_RG repo variable
  AZ_ACR: ${{ vars.AZ_ACR }}            # nome do ACR compartilhado (definir como repo variable)
  AZ_AKS: ${{ vars.AZ_AKS }}            # configurar via AZ_AKS repo variable
  HELM_NAMESPACE: teams-msgs
  HELM_RELEASE: teams-msgs

jobs:
  build-push:
    name: Build & Push images to ACR
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "tag=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          fi

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZ_SUBSCRIPTION }}

      - name: Validate shared registry
        run: |
          if [ -z "${AZ_ACR}" ]; then
            echo "AZ_ACR não configurado. Defina a repo variable AZ_ACR com o nome do ACR compartilhado." >&2
            exit 1
          fi

      - name: ACR build (API)
        run: |
          az acr build \
            --registry $AZ_ACR \
            --image teams-msgs/api:${{ steps.tag.outputs.tag }} \
            --image teams-msgs/api:latest \
            --file docker/Dockerfile.api \
            .

      - name: ACR build (Worker)
        run: |
          az acr build \
            --registry $AZ_ACR \
            --image teams-msgs/worker:${{ steps.tag.outputs.tag }} \
            --image teams-msgs/worker:latest \
            --file docker/Dockerfile.worker \
            .

  helm-upgrade:
    name: Helm upgrade in AKS
    runs-on: ubuntu-latest
    needs: build-push
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZ_SUBSCRIPTION }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials -g $AZ_RG -n $AZ_AKS --overwrite-existing

      - uses: azure/setup-helm@v4

      - name: Helm upgrade
        run: |
          helm upgrade --install $HELM_RELEASE deploy/helm/teams-msgs \
            --create-namespace -n $HELM_NAMESPACE \
            -f deploy/helm/teams-msgs/values.yaml \
            -f deploy/helm/teams-msgs/values-poc.yaml \
            --set image.registry=${AZ_ACR}.azurecr.io \
            --set image.apiTag=${{ needs.build-push.outputs.tag }} \
            --set image.workerTag=${{ needs.build-push.outputs.tag }} \
            --wait --timeout 5m
