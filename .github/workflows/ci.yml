name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'docker/**'
      - 'Directory.*.props'
      - 'TeamsMsgs.sln'
      - '.github/workflows/ci.yml'

permissions:
  contents: read

jobs:
  build-test:
    name: Build & Test (.NET 8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore TeamsMsgs.sln

      - name: Build
        run: dotnet build TeamsMsgs.sln -c Release --no-restore --nologo

      - name: Test
        run: dotnet test TeamsMsgs.sln -c Release --no-build --nologo --logger "trx;LogFileName=test_results.trx" --collect:"XPlat Code Coverage"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/TestResults/**/*.trx'

  lint-bicep:
    name: Bicep Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Bicep
        run: |
          curl -Lo bicep https://github.com/Azure/bicep/releases/latest/download/bicep-linux-x64
          chmod +x bicep && sudo mv bicep /usr/local/bin/
          bicep --version
      - name: Build Bicep
        run: bicep build deploy/bicep/main.bicep --stdout > /dev/null

  lint-helm:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: 'latest'
      - run: helm lint deploy/helm/teams-msgs
