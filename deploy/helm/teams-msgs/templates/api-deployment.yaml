apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "teams-msgs.fullname" . }}-api
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "teams-msgs.api.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      {{- include "teams-msgs.api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "teams-msgs.api.selectorLabels" . | nindent 8 }}
        {{- if .Values.workloadIdentity.enabled }}
        azure.workload.identity/use: "true"
        {{- end }}
    spec:
      serviceAccountName: teams-msgs-api
      containers:
        - name: api
          image: {{ include "teams-msgs.api.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: {{ include "teams-msgs.fullname" . }}-config
            - secretRef:
                name: {{ include "teams-msgs.fullname" . }}-secret
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
