{{- if .Values.worker.keda.enabled }}
apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: {{ include "teams-msgs.fullname" . }}-worker-auth
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "teams-msgs.worker.labels" . | nindent 4 }}
spec:
  secretTargetRef:
    - parameter: connection
      name: {{ include "teams-msgs.fullname" . }}-secret
      key: ServiceBus__ConnectionString
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: {{ include "teams-msgs.fullname" . }}-worker
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "teams-msgs.worker.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    name: {{ include "teams-msgs.fullname" . }}-worker
  pollingInterval: {{ .Values.worker.keda.pollingInterval }}
  cooldownPeriod: {{ .Values.worker.keda.cooldownPeriod }}
  minReplicaCount: {{ .Values.worker.keda.minReplicaCount }}
  maxReplicaCount: {{ .Values.worker.keda.maxReplicaCount }}
  triggers:
    - type: azure-servicebus
      authenticationRef:
        name: {{ include "teams-msgs.fullname" . }}-worker-auth
      metadata:
        queueName: {{ .Values.serviceBus.queueName | quote }}
        messageCount: {{ .Values.worker.keda.queueLength | quote }}
        activationMessageCount: {{ .Values.worker.keda.queueLengthDeactivationThreshold | quote }}
{{- end }}
