{{- if and .Values.istio.enabled .Values.worker.rateLimit.enabled }}
# Token bucket POR POD no sidecar outbound do worker.
# Limite global aproximado = maxReplicaCount * tokensPerFill / fillInterval.
apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: {{ include "teams-msgs.fullname" . }}-worker-ratelimit
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "teams-msgs.worker.labels" . | nindent 4 }}
spec:
  workloadSelector:
    labels:
      {{- include "teams-msgs.worker.selectorLabels" . | nindent 6 }}
  configPatches:
    - applyTo: HTTP_FILTER
      match:
        context: SIDECAR_OUTBOUND
        listener:
          filterChain:
            filter:
              name: "envoy.filters.network.http_connection_manager"
      patch:
        operation: INSERT_BEFORE
        value:
          name: envoy.filters.http.local_ratelimit
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.filters.http.local_ratelimit.v3.LocalRateLimit
            stat_prefix: teams_msgs_worker
            token_bucket:
              max_tokens: {{ .Values.worker.rateLimit.maxTokens }}
              tokens_per_fill: {{ .Values.worker.rateLimit.tokensPerFill }}
              fill_interval: {{ .Values.worker.rateLimit.fillInterval }}
            filter_enabled:
              runtime_key: local_rate_limit_enabled
              default_value:
                numerator: 100
                denominator: HUNDRED
            filter_enforced:
              runtime_key: local_rate_limit_enforced
              default_value:
                numerator: 100
                denominator: HUNDRED
{{- end }}
