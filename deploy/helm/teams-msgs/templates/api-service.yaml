apiVersion: v1
kind: Service
metadata:
  name: {{ include "teams-msgs.fullname" . }}-api
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "teams-msgs.api.labels" . | nindent 4 }}
spec:
  type: {{ .Values.api.service.type }}
  selector:
    {{- include "teams-msgs.api.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.api.service.port }}
      targetPort: {{ .Values.api.service.targetPort }}
