nameOverride: ""
fullnameOverride: ""

namespace: teams-msgs

image:
  registry: ""
  repository: "teams-msgs/"
  apiTag: "latest"
  workerTag: "latest"
  pullPolicy: IfNotPresent

# workloadIdentity removido; auth via connection strings no Secret.
storage:
  connectionString: ""
  refsTableName: conversationrefs

serviceBus:
  connectionString: ""
  queueName: send-messages
  maxDeliveryCount: 5

redis:
  connectionString: ""

rateLimit:
  enabled: true
  capacity: 50
  ratePerSec: 50
  key: "ratelimit:bot"

bot:
  appId: ""
  appPassword: ""
  tenantId: ""

api:
  replicaCount: 1
  apiKey: ""
  sendFlushConcurrency: 5
  service:
    type: ClusterIP        # PoC com Istio Gateway p/ ingress; trocar p/ LoadBalancer se sem mesh
    port: 80
    targetPort: 8080
  resources:
    requests:
      cpu: 100m
      memory: 192Mi
    limits:
      cpu: 1000m
      memory: 512Mi
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 5
    targetCpuUtilizationPercentage: 70

worker:
  maxConcurrent: 10
  pollBatchSize: 32
  visibilityTimeout: "00:05:00"
  emptyQueueBackoff: "00:00:02"
  messageCacheTtl: "00:05:00"
  # Timeout do HttpClient do conector do Bot (curto de propósito: o default de 100s
  # prende slots de concorrência quando um destinatário "pendura" a requisição).
  sendTimeout: "00:00:20"
  resources:
    requests:
      cpu: 100m
      memory: 192Mi
    limits:
      cpu: 1000m
      memory: 512Mi
  keda:
    enabled: true
    pollingInterval: 10
    cooldownPeriod: 60
    minReplicaCount: 0
    maxReplicaCount: 10
    queueLength: "20"
    queueLengthDeactivationThreshold: "0"

istio:
  enabled: true
  injectionLabel: "enabled"

logLevel: Information
