# Istio Gateway + HTTPRoute (Kubernetes Gateway API v1) + cert-manager Certificate
# Substitui o Ingress NGINX. Cert-manager 1.15+ usa Gateway API HTTPRoute para resolver HTTP-01 challenge.

apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: teams-msgs-gateway
  namespace: aks-istio-ingress
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  gatewayClassName: istio
  addresses:
    - value: aks-istio-ingressgateway-external.aks-istio-ingress.svc.cluster.local
      type: Hostname
  listeners:
    - name: http
      hostname: teams-msgs-dotnet.brazilsouth.cloudapp.azure.com
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
    - name: https
      hostname: teams-msgs-dotnet.brazilsouth.cloudapp.azure.com
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: teams-msgs-gw-tls
      allowedRoutes:
        namespaces:
          from: All
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: teams-msgs-route
  namespace: teams-msgs
spec:
  parentRefs:
    - name: teams-msgs-gateway
      namespace: aks-istio-ingress
      sectionName: https
  hostnames:
    - teams-msgs-dotnet.brazilsouth.cloudapp.azure.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: teams-msgs-api
          port: 80
      timeouts:
        request: 600s            # SLA p/ /api/send com fan-out grande
        backendRequest: 600s
